name: ci

# 触发: 推 main 或对 main 开 PR. 手动 dispatch 也开着.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# 同分支重复推时, 取消上一个跑没跑完的 (省 CI 时间)
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # 一锅煮: typecheck + lint + test. 任何一步炸就 fail.
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # pnpm 必须先于 setup-node — setup-node 的 cache=pnpm 需要 pnpm 已就位才能定位 store
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.3.0

      # 必须 Node 22+ : pnpm 11.x bootstrap 用 node:sqlite (Node 22.13 才有的 builtin),
      # Node 20 上 pnpm 自举就抛 ERR_UNKNOWN_BUILTIN_MODULE: node:sqlite
      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install deps
        # --frozen-lockfile: 防 CI 偷偷升级依赖 (本机 pnpm-lock 是真相)
        # native build 白名单走 pnpm-workspace.yaml 的 allowBuilds (boolean map),
        # 否则 pnpm 11 默认拒所有 install script 防供应链攻击
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Test
        run: pnpm test
